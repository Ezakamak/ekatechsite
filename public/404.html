<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>404 — EkaTech</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #000;
        color: #fff;
      }

      body {
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      .scene {
        position: relative;
        width: 100%;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        isolation: isolate;
      }

      .scene::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(139, 92, 246, 0.24), transparent 34%),
          radial-gradient(circle at 80% 60%, rgba(0, 212, 255, 0.18), transparent 34%),
          linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
        background-size: auto, auto, 64px 64px, 64px 64px;
        opacity: 0.85;
        z-index: -2;
      }

      .scene::after {
        content: "";
        position: absolute;
        width: 600px;
        height: 600px;
        border-radius: 999px;
        background: rgba(0, 212, 255, 0.08);
        filter: blur(105px);
        z-index: -1;
      }

      .card {
        width: min(760px, 100%);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 34px;
        background: rgba(255, 255, 255, 0.035);
        box-shadow: 0 0 120px rgba(0, 212, 255, 0.12);
        backdrop-filter: blur(24px);
        padding: clamp(28px, 5vw, 58px);
        text-align: center;
        position: relative;
        overflow: hidden;
      }

      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background: radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.12), transparent 55%);
        pointer-events: none;
      }

      .logo-wrap {
        position: relative;
        width: 94px;
        height: 94px;
        margin: 0 auto 28px;
        display: grid;
        place-items: center;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 26px;
        background: rgba(255, 255, 255, 0.06);
        box-shadow: 0 0 50px rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(18px);
      }

      .logo-wrap img {
        width: 66px;
        height: 66px;
        object-fit: contain;
        display: block;
        filter: drop-shadow(0 0 18px rgba(255, 255, 255, 0.16));
      }

      .logo-wrap.logo-fallback {
        display: none;
      }

      .eyebrow {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 16px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.045);
        color: rgba(255, 255, 255, 0.58);
        font-size: 13px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #00d4ff;
        box-shadow: 0 0 22px rgba(0, 212, 255, 0.9);
      }

      h1 {
        position: relative;
        margin: 28px 0 0;
        font-size: clamp(72px, 14vw, 150px);
        line-height: 0.85;
        letter-spacing: -0.1em;
        font-weight: 700;
        background: linear-gradient(90deg, #ffffff, #8b5cf6, #00d4ff);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      h2 {
        position: relative;
        margin: 30px auto 0;
        max-width: 680px;
        font-size: clamp(32px, 5vw, 62px);
        line-height: 0.98;
        letter-spacing: -0.06em;
        font-weight: 600;
      }

      p {
        position: relative;
        margin: 22px auto 0;
        max-width: 580px;
        color: rgba(255, 255, 255, 0.55);
        font-size: clamp(16px, 2vw, 19px);
        line-height: 1.7;
      }

      .actions {
        position: relative;
        margin-top: 36px;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 14px;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .primary,
      .secondary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 54px;
        padding: 0 24px;
        border-radius: 999px;
        font-weight: 650;
        transition: transform 180ms ease, background 180ms ease, border-color 180ms ease;
      }

      .primary {
        background: #fff;
        color: #000;
      }

      .secondary {
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.05);
        color: rgba(255, 255, 255, 0.8);
      }

      .primary:hover,
      .secondary:hover {
        transform: translateY(-2px);
      }

      .secondary:hover {
        border-color: rgba(0, 212, 255, 0.45);
        background: rgba(0, 212, 255, 0.08);
      }

      .orbit {
        position: absolute;
        left: 50%;
        top: 50%;
        width: min(410px, calc(100vw - 104px));
        aspect-ratio: 1;
        transform: translate(-50%, -50%);
        border: 1px solid rgba(255, 255, 255, 0.04);
        border-radius: 999px;
        pointer-events: none;
        overflow: hidden;
        opacity: 0.95;
      }

      .orbiter {
        position: absolute;
        inset: 0;
        border-radius: inherit;
      }

      .orbiter.one {
        animation: spin 14s linear infinite;
      }

      .orbiter.two {
        animation: spinReverse 18s linear infinite;
      }

      .comet-arc {
        position: absolute;
        inset: 0;
        border-radius: inherit;
        opacity: 0.96;
        -webkit-mask: radial-gradient(
          farthest-side,
          transparent calc(100% - 18px),
          #000 calc(100% - 17px),
          #000 calc(100% - 3px),
          transparent calc(100% - 2px)
        );
        mask: radial-gradient(
          farthest-side,
          transparent calc(100% - 18px),
          #000 calc(100% - 17px),
          #000 calc(100% - 3px),
          transparent calc(100% - 2px)
        );
        filter: blur(1.5px);
      }

      .comet-arc.cyan {
        background: conic-gradient(
          from -96deg,
          rgba(0, 212, 255, 0.95) 0deg,
          rgba(0, 212, 255, 0.62) 8deg,
          rgba(0, 212, 255, 0.28) 22deg,
          rgba(0, 212, 255, 0.1) 42deg,
          rgba(0, 212, 255, 0) 74deg,
          transparent 360deg
        );
      }

      .comet-arc.purple {
        background: conic-gradient(
          from 84deg,
          rgba(139, 92, 246, 0.95) 0deg,
          rgba(139, 92, 246, 0.62) 8deg,
          rgba(139, 92, 246, 0.28) 22deg,
          rgba(139, 92, 246, 0.1) 42deg,
          rgba(139, 92, 246, 0) 74deg,
          transparent 360deg
        );
      }

      .comet-head {
        position: absolute;
        left: 50%;
        top: 0;
        width: 12px;
        height: 12px;
        transform: translate(-50%, -50%);
        border-radius: 999px;
        z-index: 2;
      }

      .comet-head.cyan {
        background: #00d4ff;
        box-shadow:
          0 0 12px rgba(0, 212, 255, 1),
          0 0 28px rgba(0, 212, 255, 0.85),
          0 0 52px rgba(0, 212, 255, 0.45);
      }

      .comet-head.purple {
        top: 100%;
        background: #8b5cf6;
        box-shadow:
          0 0 12px rgba(139, 92, 246, 1),
          0 0 28px rgba(139, 92, 246, 0.85),
          0 0 52px rgba(139, 92, 246, 0.45);
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes spinReverse {
        to {
          transform: rotate(-360deg);
        }
      }

      @media (max-width: 640px) {
        body {
          overflow: auto;
        }

        .scene {
          align-items: start;
          padding-top: 56px;
        }

        .orbit {
          width: min(300px, calc(100vw - 56px));
          opacity: 0.55;
        }

        .actions {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main class="scene">
      <section class="card" aria-labelledby="title">
        <div class="orbit">
          <div class="orbiter one">
            <div class="comet-arc cyan"></div>
            <div class="comet-head cyan"></div>
          </div>
          <div class="orbiter two">
            <div class="comet-arc purple"></div>
            <div class="comet-head purple"></div>
          </div>
        </div>

        <div class="logo-wrap" aria-label="EkaTech Logo">
          <img
            src="https://raw.githubusercontent.com/Ezakamak/ekatechsite/main/src/imports/View_recent_photos.png"
            alt="EkaTech logo"
            onerror="this.parentElement.classList.add('logo-fallback')"
          />
        </div>

        <div class="eyebrow"><span class="dot"></span> Page not found</div>
        <h1>404</h1>
        <h2 id="title">This page slipped into the void.</h2>
        <p>
          The link may be broken, moved, or still waiting to be built. Return to
          EkaTech and keep exploring the system.
        </p>
        <div class="actions">
          <a class="primary" href="/">Back to Home</a>
          <a class="secondary" href="/#contact">Contact EkaTech</a>
        </div>
      </section>
    </main>
  </body>
</html>
