<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>404 — EkaTech</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #000;
        color: #fff;
      }

      body {
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      .scene {
        position: relative;
        width: 100%;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        isolation: isolate;
      }

      .scene::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(139, 92, 246, 0.24), transparent 34%),
          radial-gradient(circle at 80% 60%, rgba(0, 212, 255, 0.18), transparent 34%),
          linear-gradient(to right, rgba(255, 255, 255, 0.06) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(255, 255, 255, 0.06) 1px, transparent 1px);
        background-size: auto, auto, 64px 64px, 64px 64px;
        opacity: 0.8;
        z-index: -2;
      }

      .scene::after {
        content: "";
        position: absolute;
        width: 720px;
        height: 720px;
        border-radius: 999px;
        background: rgba(0, 212, 255, 0.08);
        filter: blur(120px);
        z-index: -1;
      }

      .card {
        width: min(920px, 100%);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 34px;
        background: rgba(255, 255, 255, 0.035);
        box-shadow: 0 0 120px rgba(0, 212, 255, 0.12);
        backdrop-filter: blur(24px);
        padding: clamp(28px, 6vw, 72px);
        text-align: center;
        position: relative;
        overflow: hidden;
      }

      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.12), transparent 55%);
        pointer-events: none;
      }

      .logo {
        position: relative;
        width: 72px;
        height: 72px;
        margin: 0 auto 28px;
        display: grid;
        place-items: center;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.94);
        color: #000;
        font-weight: 900;
        font-size: 24px;
        letter-spacing: -0.12em;
        box-shadow: 0 0 50px rgba(255, 255, 255, 0.12);
      }

      .eyebrow {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 16px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.045);
        color: rgba(255, 255, 255, 0.58);
        font-size: 13px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #00d4ff;
        box-shadow: 0 0 22px rgba(0, 212, 255, 0.9);
      }

      h1 {
        position: relative;
        margin: 28px 0 0;
        font-size: clamp(72px, 16vw, 170px);
        line-height: 0.85;
        letter-spacing: -0.1em;
        font-weight: 700;
        background: linear-gradient(90deg, #ffffff, #8b5cf6, #00d4ff);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      h2 {
        position: relative;
        margin: 30px auto 0;
        max-width: 760px;
        font-size: clamp(34px, 6vw, 72px);
        line-height: 0.95;
        letter-spacing: -0.065em;
        font-weight: 600;
      }

      p {
        position: relative;
        margin: 22px auto 0;
        max-width: 620px;
        color: rgba(255, 255, 255, 0.55);
        font-size: clamp(16px, 2vw, 20px);
        line-height: 1.7;
      }

      .actions {
        position: relative;
        margin-top: 36px;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 14px;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .primary,
      .secondary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 54px;
        padding: 0 24px;
        border-radius: 999px;
        font-weight: 650;
        transition: transform 180ms ease, background 180ms ease, border-color 180ms ease;
      }

      .primary {
        background: #fff;
        color: #000;
      }

      .secondary {
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.05);
        color: rgba(255, 255, 255, 0.8);
      }

      .primary:hover,
      .secondary:hover {
        transform: translateY(-2px);
      }

      .secondary:hover {
        border-color: rgba(0, 212, 255, 0.45);
        background: rgba(0, 212, 255, 0.08);
      }

      .orbit {
        position: absolute;
        inset: 40px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 999px;
        animation: spin 18s linear infinite;
        pointer-events: none;
      }

      .orbit::before,
      .orbit::after {
        content: "";
        position: absolute;
        width: 12px;
        height: 12px;
        border-radius: 999px;
        background: #00d4ff;
        box-shadow: 0 0 22px rgba(0, 212, 255, 0.9);
      }

      .orbit::before {
        left: 14%;
        top: 8%;
      }

      .orbit::after {
        right: 12%;
        bottom: 10%;
        background: #8b5cf6;
        box-shadow: 0 0 22px rgba(139, 92, 246, 0.9);
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 640px) {
        body {
          overflow: auto;
        }

        .scene {
          align-items: start;
          padding-top: 56px;
        }

        .orbit {
          display: none;
        }

        .actions {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main class="scene">
      <section class="card" aria-labelledby="title">
        <div class="orbit"></div>
        <div class="logo" aria-label="EkaTech">EK</div>
        <div class="eyebrow"><span class="dot"></span> Page not found</div>
        <h1>404</h1>
        <h2 id="title">This page slipped into the void.</h2>
        <p>
          The link may be broken, moved, or still waiting to be built. Return to
          EkaTech and keep exploring the system.
        </p>
        <div class="actions">
          <a class="primary" href="/">Back to Home</a>
          <a class="secondary" href="/#contact">Contact EkaTech</a>
        </div>
      </section>
    </main>
  </body>
</html>
